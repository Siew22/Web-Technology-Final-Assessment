<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List Order App</title>
    <link rel="stylesheet" href="grocery.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Grocery List Order App</h1>
        </header>

        <div class="input-section">
            <div class="input-group">
                <label for="itemName">Item Name</label>
                <input type="text" id="itemName" placeholder="e.g., Apples">
            </div>
            <div class="input-group">
                <label for="itemQty">Quantity</label>
                <input type="number" id="itemQty" min="1" placeholder="e.g., 5">
            </div>
            <div class="input-group">
                <label for="itemPrice">Price per unit (RM)</label>
                <input type="number" id="itemPrice" min="0.01" step="0.01" placeholder="e.g., 2.00">
            </div>
            <div class="input-group btn-group">
                <button id="addBtn" class="btn-add">Add to Cart</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Price per unit</th>
                    <th>Total Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cartBody">
                <tr id="emptyRow">
                    <td colspan="5" class="empty-message">Your list is currently empty. Add items above.</td>
                </tr>
            </tbody>
        </table>
        <div class="total-section">
            Total Cost: <span id="grandTotal">RM 0.00</span>
        </div>
    </div>

    <script src="grocery.js"></script>
</body>
</html>
